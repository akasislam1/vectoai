<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VectoAI — Login / Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0a14;--bg2:#12121f;--bg3:#1a1a2e;--accent:#7c3aed;--text:#f1f0ff;--muted:#8b8aa8;--border:#2a2a3e}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:36px;width:100%;max-width:420px}
.logo{text-align:center;margin-bottom:28px}
.logo a{font-size:22px;font-weight:800;color:var(--text);text-decoration:none;display:inline-flex;align-items:center;gap:8px}
.logo-icon{width:36px;height:36px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:28px}
.tab-btn{flex:1;padding:9px;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;border-radius:7px;transition:all .2s;font-family:inherit}
.tab-btn.active{background:var(--accent);color:#fff}
label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
input{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:16px}
input:focus{border-color:var(--accent)}
input::placeholder{color:var(--muted)}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;background:var(--accent);color:#fff;transition:all .2s}
.btn:disabled{opacity:0.6;cursor:not-allowed}
.msg{padding:12px 14px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;text-align:center}
.err{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);color:#fca5a5}
.ok{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.4);color:#86efac}
.form-section{display:none}
.form-section.active{display:block}
.back{text-align:center;margin-top:20px;font-size:13px;color:var(--muted)}
.back a{color:#a78bfa;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <a href="index.html"><div class="logo-icon">⬡</div> VectoAI</a>
  </div>
  <div class="tabs">
    <button class="tab-btn active" onclick="go('login')">Login</button>
    <button class="tab-btn" onclick="go('signup')">Sign Up</button>
  </div>
  <div class="msg" id="msg"></div>
  <div class="form-section active" id="loginForm">
    <label>Email</label>
    <input type="email" id="le" placeholder="email@example.com">
    <label>Password</label>
    <input type="password" id="lp" placeholder="your password">
    <button class="btn" onclick="doLogin()" id="lbtn">Login →</button>
  </div>
  <div class="form-section" id="signupForm">
    <label>Full Name</label>
    <input type="text" id="sn" placeholder="Your name">
    <label>Email</label>
    <input type="email" id="se" placeholder="email@example.com">
    <label>Password</label>
    <input type="password" id="sp" placeholder="min 6 characters">
    <button class="btn" onclick="doSignup()" id="sbtn">Create account →</button>
  </div>
  <div class="back"><a href="index.html">← Back to home</a></div>
</div>

<script>
let sb;
try {
  sb = supabase.createClient(CONFIG.supabase.url, CONFIG.supabase.anonKey);
} catch(e) {
  showMsg('Config error: ' + e.message, 'err');
}

// Already logged in?
if(sb) sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='app.html';
});

const params = new URLSearchParams(window.location.search);
if(params.get('tab')==='signup') go('signup');

function go(tab){
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', i===(tab==='login'?0:1)));
  document.getElementById('loginForm').classList.toggle('active', tab==='login');
  document.getElementById('signupForm').classList.toggle('active', tab==='signup');
  showMsg('');
}

function showMsg(text, cls='err'){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'msg ' + cls;
  el.style.display = text ? 'block' : 'none';
}

async function doLogin(){
  const email = document.getElementById('le').value.trim();
  const pass  = document.getElementById('lp').value;
  if(!email || !pass){ showMsg('Email ও password দাও'); return; }
  const btn = document.getElementById('lbtn');
  btn.disabled = true; btn.textContent = 'Logging in...';
  try {
    const {data, error} = await sb.auth.signInWithPassword({email, password:pass});
    if(error) throw error;
    window.location.href = 'app.html';
  } catch(e){
    showMsg(e.message);
    btn.disabled = false; btn.textContent = 'Login →';
  }
}

async function doSignup(){
  const name  = document.getElementById('sn').value.trim();
  const email = document.getElementById('se').value.trim();
  const pass  = document.getElementById('sp').value;
  if(!name || !email || !pass){ showMsg('সব field পূরণ করো'); return; }
  if(pass.length < 6){ showMsg('Password কমপক্ষে ৬ character হতে হবে'); return; }
  const btn = document.getElementById('sbtn');
  btn.disabled = true; btn.textContent = 'Creating account...';
  try {
    const {data, error} = await sb.auth.signUp({email, password:pass, options:{data:{full_name:name}}});
    if(error) throw error;
    // Save profile (ignore error)
    if(data.user){
      await sb.from('profiles').upsert({id:data.user.id, email, name, plan:'free'}).select();
    }
    showMsg('✅ Account created! Logging in...', 'ok');
    // Login immediately
    setTimeout(async()=>{
      const {error:le} = await sb.auth.signInWithPassword({email, password:pass});
      if(!le) window.location.href = 'app.html';
      else { showMsg('Account created! Now login below.', 'ok'); go('login'); }
    }, 800);
  } catch(e){
    showMsg('Error: ' + e.message);
    btn.disabled = false; btn.textContent = 'Create account →';
  }
}
</script>
</body>
</html>
